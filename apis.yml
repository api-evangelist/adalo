aid: adalo
name: Adalo
description: >-
  Adalo is a visual no-code app builder that lets users design, build, and
  publish native iOS, Android, and web applications without writing code,
  combining a drag-and-drop canvas with AI-assisted generation and hosted
  Postgres-backed collections. The platform supports external data sources,
  pre-built feature templates, and 2,000+ integrations via Zapier and Make,
  hosting over a million apps. The Adalo API provides REST access to app
  collections and push notifications, secured with a per-app Bearer API key.
type: Index
